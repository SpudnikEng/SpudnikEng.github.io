<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spudnik Harvester UI Mockup</title>
<style>
  :root {
    --bg: #10151b; --panel: #19222c; --panel-2: #202c37; --card: #253441; --text: #f3f7fb; --muted: #aab7c4; --border: #394a59; --accent: #ec1c24; --accent-2: #ffcc33; --green: #49d17d; --blue: #55b8ff; --orange: #ff9b42; --shadow: rgba(0,0,0,.35);
  }
  body.day { --bg: #e7edf3; --panel: #f7fafc; --panel-2: #edf2f7; --card: #fff; --text: #17202a; --muted: #566575; --border: #c5d0dc; --shadow: rgba(20,30,40,.14); }
  * { box-sizing: border-box; }
  body { margin: 0; background: #070b0f; font-family: Arial, Helvetica, sans-serif; color: var(--text); display: grid; place-items: center; min-height: 100vh; user-select: none; }
  .screen { width: 1280px; height: 800px; background: var(--bg); padding: 12px; display: grid; grid-template-rows: 76px 118px 452px 100px; gap: 10px; overflow: hidden; }
  .row,.panel,.button,.tab,.preset,.control-card { border: 2px solid var(--border); border-radius: 18px; background: var(--panel); box-shadow: 0 4px 14px var(--shadow); }
  .top-row { display: grid; grid-template-columns: 236px 235px 1fr 360px; gap: 10px; align-items: stretch; }
  .logo-box,.machine-box,.status-strip,.top-actions { display: flex; align-items: center; padding: 8px 12px; min-width: 0; }
  .logo-box img { width: 206px; height: 50px; object-fit: contain; background: rgba(255,255,255,.94); border-radius: 10px; padding: 5px; }
  .machine-box { flex-direction: column; align-items: flex-start; justify-content: center; gap: 4px; font-size: 18px; font-weight: 700; }
  .machine-box span { color: var(--muted); font-size: 14px; font-weight: 700; letter-spacing: .03em; }
  .status-strip { gap: 8px; justify-content: space-between; }
  .status-pill { flex: 1; min-width: 0; height: 52px; border-radius: 16px; background: var(--panel-2); border: 2px solid var(--border); display: grid; place-items: center; padding: 4px; font-weight: 800; font-size: 13px; text-align: center; text-transform: uppercase; }
  .status-pill strong { display: block; font-size: 18px; line-height: 19px; color: var(--green); }
  .status-pill.warn strong { color: var(--orange); }
  .top-actions { gap: 8px; justify-content: end; padding: 8px; }
  button { font-family: inherit; color: inherit; cursor: pointer; }
  .button { min-height: 58px; padding: 0 16px; font-size: 18px; font-weight: 900; background: linear-gradient(180deg, var(--card), var(--panel-2)); }
  .button.run { background: linear-gradient(180deg, #39cc73, #178b45); color: #07110b; border-color: #80efaa; min-width: 84px; }
  .button:focus,.button.joy-focus,.tab:focus,.preset:focus,.control-card.selected { outline: 5px solid var(--accent-2); outline-offset: -4px; border-color: var(--accent-2); }
  .message-row { display: grid; grid-template-columns: 1fr 392px; gap: 10px; }
  .messages { padding: 12px; display: grid; grid-template-rows: 32px 1fr; gap: 8px; }
  .section-title { color: var(--muted); font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
  .message-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .msg { background: var(--panel-2); border: 2px solid var(--border); border-radius: 14px; padding: 10px 12px; font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .dot { width: 18px; height: 18px; border-radius: 50%; background: var(--green); flex: none; box-shadow: 0 0 0 4px rgba(73,209,125,.15); }
  .dot.yellow { background: var(--accent-2); box-shadow: 0 0 0 4px rgba(255,204,51,.15); }
  .quick-actions { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quick-actions .button { min-height: 44px; font-size: 17px; }
  .main-row { display: grid; grid-template-columns: 1fr 156px; gap: 10px; min-height: 0; }
  .workspace { padding: 12px; display: grid; grid-template-rows: 42px 1fr; gap: 10px; min-width: 0; }
  .workspace-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .workspace-title { font-size: 26px; font-weight: 950; letter-spacing: .02em; }
  .hint { color: var(--muted); font-size: 16px; font-weight: 800; }
  .controls-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr; gap: 10px; min-height: 0; }
  .control-card { padding: 12px; background: var(--card); display: grid; grid-template-rows: auto 1fr auto; gap: 10px; min-height: 0; }
  .control-name { font-size: 20px; font-weight: 950; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .value { color: var(--blue); font-size: 26px; font-weight: 950; white-space: nowrap; }
  .adjust { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; }
  .plusminus { min-height: 72px; border-radius: 18px; border: 2px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 42px; font-weight: 950; }
  .bar-wrap { height: 170px; border: 2px solid var(--border); border-radius: 16px; padding: 8px; background: var(--panel-2); display: flex; align-items: end; justify-content: center; }
  .bar { width: 54px; border-radius: 12px 12px 8px 8px; background: linear-gradient(180deg, var(--green), var(--blue)); min-height: 18px; }
  .control-card.selected .bar { background: linear-gradient(180deg, var(--accent-2), var(--orange)); }
  .tabs { padding: 8px; display: grid; grid-template-rows: repeat(6, 1fr); gap: 8px; }
  .tab { min-height: 62px; font-size: 20px; font-weight: 950; background: var(--panel-2); }
  .tab.active { background: var(--accent); color: #fff; border-color: #ff7a80; box-shadow: inset 0 0 0 3px rgba(255,255,255,.18); }
  .preset-row { display: grid; grid-template-columns: repeat(3, 1fr) repeat(3, 1fr) 156px; gap: 10px; }
  .preset,.theme-toggle { font-size: 22px; font-weight: 950; border-radius: 20px; background: linear-gradient(180deg, var(--card), var(--panel-2)); border: 2px solid var(--border); color: var(--text); }
  .preset.dig { border-color: rgba(85,184,255,.8); }
  .preset.clean { border-color: rgba(73,209,125,.8); }
  .theme-toggle { border-color: var(--accent-2); font-size: 18px; line-height: 1.1; }
  .kbd { display: inline-block; padding: 2px 7px; border-radius: 7px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); font-size: 13px; margin-left: 6px; }
</style>
</head>

      <div class="row status-strip">
        <div class="status-pill">Pressure<strong>2480</strong>PSI</div><div class="status-pill">Dig<strong>READY</strong></div><div class="status-pill warn">Temp<strong>184°</strong>F</div><div class="status-pill">Boom Speed<strong>42%</strong></div>
      </div>
      <div class="row top-actions"><button class="button">Help</button><button class="button">Diagnostics</button><button class="button">Settings</button><button class="button run">RUN</button></div>
    </section>
    <section class="message-row">
      <div class="panel messages"><div class="section-title">Information & Alarm Messages</div><div class="message-list"><div class="msg"><span class="dot"></span> All systems enabled</div><div class="msg"><span class="dot yellow"></span> Table fan near preset limit</div><div class="msg"><span class="dot"></span> Digger depth holding target</div><div class="msg"><span class="dot"></span> No active safety alarms</div></div></div>
      <div class="panel quick-actions"><button class="button">Conveyor Pause</button><button class="button">Auto Depth</button><button class="button">Lights</button><button class="button">Camera</button></div>
    </section>
    <section class="main-row">
      <div class="panel workspace"><div class="workspace-header"><div class="workspace-title" id="areaTitle">Home Controls</div><div class="hint">Yellow outline = selected joystick/touch control <span class="kbd">←↑↓→</span></div></div><div class="controls-grid" id="controlsGrid"></div></div>
      <div class="panel tabs" role="tablist" aria-label="Machine areas"><button class="tab active" data-tab="Home">Home</button><button class="tab" data-tab="Digger">Digger</button><button class="tab" data-tab="Chains">Chains</button><button class="tab" data-tab="Table">Table</button><button class="tab" data-tab="Boom">Boom</button><button class="tab" data-tab="Axle">Axle</button></div>
    </section>
    <section class="preset-row"><button class="preset dig">Dig 1</button><button class="preset dig">Dig 2</button><button class="preset dig">Dig 3</button><button class="preset clean">Clean 1</button><button class="preset clean">Clean 2</button><button class="preset clean">Clean 3</button><button class="theme-toggle" id="themeToggle">Night<br/>Mode</button></section>
  </main>
<script>
const data = {
  Home: [['Digger Height','4.2 in',62],['Primary Chain','78%',78],['Secondary Chain','64%',64],['Pile Height','52%',52],['Coulter Pressure','1180 PSI',58],['Table Fan','46%',46],['Boom Speed','42%',42],['Axle Level','0.8°',35]],
  Digger: [['Blade Height','4.2 in',62],['Depth Wheel L','3.8 in',55],['Depth Wheel R','3.9 in',56],['Coulters','1180 PSI',70],['Hump Height','2.1 in',45],['Auto Depth Gain','62%',62],['Shaker Rate','38%',38],['Dig Tilt','0.4°',36]],
  Chains: [['Primary Chain','78%',78],['Secondary Chain','64%',64],['Devine Chain','51%',51],['Rear Cross','44%',44],['Speed Match','ON',85],['Chain Reverser','OFF',15],['Load','68%',68],['Slip Monitor','OK',30]],
  Table: [['Table Height','32%',32],['Table Angle','12°',48],['Roller Gap','1.6 in',56],['Roller Speed','41%',41],['Fan Speed','46%',46],['Dirt Bypass','20%',20],['Clean Load','59%',59],['Inspect Speed','35%',35]],
  Boom: [['Boom Speed','42%',42],['Boom Height','64%',64],['Boom Swing','CENTER',50],['Truck Offset','4 ft',40],['Fill Elevator','28°',58],['Auto Fill','READY',82],['Spout Trim','0 in',50],['Boom Light','ON',90]],
  Axle: [['Axle Level','0.8°',35],['Left Height','52%',52],['Right Height','53%',53],['Steer Trim','0.2°',47],['Auto Level','ON',85],['Transport Lock','OFF',15],['Slope','3.1°',61],['Suspension','FIRM',72]]
};
let selectedIndex = 0;
const grid = document.getElementById('controlsGrid');
const title = document.getElementById('areaTitle');
function currentTab() { return document.querySelector('.tab.active').dataset.tab; }
function render(tab) {
  title.textContent = tab + ' Controls';
  grid.innerHTML = data[tab].map((c, i) => `
    <div class="control-card ${i === selectedIndex ? 'selected' : ''}" tabindex="0" data-index="${i}">
      <div class="control-name"><span>${c[0]}</span><span class="value">${c[1]}</span></div>
      <div class="bar-wrap"><div class="bar" style="height: ${Math.max(18, c[2] * 1.6)}px"></div></div>
      <div class="adjust"><button class="plusminus" aria-label="Decrease ${c[0]}">−</button><button class="plusminus" aria-label="Increase ${c[0]}">+</button></div>
    </div>`).join('');
  document.querySelectorAll('.control-card').forEach(card => card.addEventListener('click', () => { selectedIndex = Number(card.dataset.index); render(currentTab()); }));
}
document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); selectedIndex = 0; render(tab.dataset.tab); }));
document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('day'); const day = document.body.classList.contains('day'); document.getElementById('themeToggle').innerHTML = day ? 'Day<br/>Mode' : 'Night<br/>Mode'; });
document.addEventListener('keydown', (e) => { const cols = 4; const max = data[currentTab()].length - 1; if (e.key === 'ArrowRight') selectedIndex = Math.min(max, selectedIndex + 1); if (e.key === 'ArrowLeft') selectedIndex = Math.max(0, selectedIndex - 1); if (e.key === 'ArrowDown') selectedIndex = Math.min(max, selectedIndex + cols); if (e.key === 'ArrowUp') selectedIndex = Math.max(0, selectedIndex - cols); if (e.key.startsWith('Arrow')) { e.preventDefault(); render(currentTab()); } });
render('Home');
</script>
