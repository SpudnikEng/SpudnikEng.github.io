  <script id="version-info" type="application/json">{"S49": "<h1>Spinach Harvester (S49)<\/h1>\n<h2>Model Numbers: 7040 Terratron Self Propelled Potato Harvest<\/h2>\n<h2>Maintained by: Nathan Yost<\/h2>\n<h2>Phone: (208)239-5792<\/h2>\n<h2>email: nathan.yost@spudnik.com<\/h2>\n<h3>Version 2.03 \u2013 (June 2024) Nathan Yost<\/h3>\n<ul>\n<li>(fix) Holding Tank Piler sw controls moved down too slow so speed up the down and decreased distance between curtain and piler as to help not spill potatoes.<\/li>\n<li>(feature) Added Red box outline to pointout when mA and volt sensors aren't connected as well as if outputs aren't connected.<\/li>\n<li>(feature) Added feature to set min and max global speed mph. <\/li>\n<li>(fix) fixed multisep picture and other cosmetic display updates.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.01 \u2013 (Sep 2023) Nathan Yost<\/h3>\n<ul>\n<li>(Stable Release) Version run for 2023 harvest season.<\/li>\n<\/ul>", "S4A": "<h1>Potato Planter (S4A) - Models: 804x, 806x, 8080, 8210<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a><\/p>\n<h2>Stable release 2.11 \u2013 (Mar 2023) <!--Jack Yorgesen--><\/h2>\n<ul>\n<li>(fix) Adjusted Chem relays to come on when in Run, working position enabled, and speed is seen above 0.4MPH<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.08 (Feb 2023) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(fix) New skip detection (NOTE: Set Max potato Size to 100 for best skip detection results)<\/li>\n<li>(Added) Depth control bump up and down<\/li>\n<li>(Added) Paired cup configuration which is 2 rows driven by one motor.<\/li>\n<\/ul>\n<h3>Version 2.07 \u2013 (Aug 2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) skip detection for expansion cards<\/li>\n<\/ul>\n<h3>Version 2.06 (2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) Versions prior to this version will cause inputs to behave slightly different if using the new Rev 6 S4 version. Please update to this version or later if installing a Rev 6 S4 board<\/li>\n<li>(fix) Versions 1.66 - 2.02 should be updated to this version to fix issues with skip detection. Service bulletin sent out<\/li>\n<li>(Added) New configuration for planters that have scales on the potato Hopper. When enabled will display weight on home screen<\/li>\n<li>(Added) New feature that you can input a Raven GPS system into the Radar GPS Speed input when the box is checked in the home settings.<\/li>\n<li>(fix) Fixed Presets to function like before.\"No pause needed to switch between presets\"<\/li>\n<li>(Added) Hidden row feature for physical row along with ghost row<\/li>\n<\/ul>\n<h3>Version 2.02 (2021) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Added) New configuration for planters with cup drives in series rather than in parallel<\/li>\n<li>(Added) New feature that you can set a test ground speed from the display to run functions without actually driving<\/li>\n<\/ul>\n<h3>Version 2.01 (2021) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Added) Added hidden row feature in configuration for deere section control<\/li>\n<li>(Changed) bumped up to major version 2 because sw is ready for new hw rev boards<\/li>\n<\/ul>\n<h3>Version 1.68 (2020) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Added) Added in hill pro functionality<\/li>\n<li>(fixed) Issues arose with skip detection. Reverted back to the same as 1.63 which functions properly.<\/li>\n<\/ul>\n<!--\n### Version 1.66 \u2013 (2020) Nathan Yost\n- (Changed) Added start row and end row buttons when toolbar is enabled. The behavior is the same as when the fertilizer is enabled\n- (Changed) added another hydraulic shaker control when configuration individual row and hydraulic shaker is selected. Used to be one. This is done to match a machine with this configuration.\n\n\n### Version 1.63 \u2013 (2018) Devin Vollmer\n- (Fixed) Issues with output communication and pid.\n\n### Version 1.61 \u2013 (2018) Devin Vollmer \n- (Fixed) Issues with mechanical feed bowl sensors. \n- (Fixed) Issues with FRAM memory write interrupts which caused\n  corrupted configuration values. \n\n### Version 1.58 \u2013 (2017) Devin Vollmer \n- (Changed) Fixed password screen for chemical fertilizer.\n\n### Version 1.57 \u2013 (2017) Devin Vollmer\n-   (Changed) Fixed expansion code version.\n\n### Version 1.56 \u2013 (2017) Devin Vollmer \n-   (Changed) Skip Detection calculation update to improve accuracy \n-   (Added) ISO GPS Speed \n-   (Fixed) FIFO Buffer handling in CAN driver, fixes dropping CCI \n-   (Added) Dropped CCI handling to keep planter running until CCI comes back online \n-   (Changed) CCI pool transfer to transfer only if pool version has changed \n-   (Added) Calibration factor for seed spacing independent from wheel size \n-   (Fixed) Dry fert calibration \n\n### Version 1.33 \u2013 1.47 (2017) Devin Vollmer\n\n### Version 1.31 \u2013 (2016) Jared Wadsworth \n-   (Fixed) Issue with skip detection on 8210. \n-   (Changed) Refined hiller controls. \n\n### Version 1.30 - (2016) Jared Wadsworth \n-   (Added) Alarm to fertilizer drive. \n-   (Changed) Refined split cup drive. \n-   (Changed) Skip alarm sounds. \n\n### Version 1.28 - (2016) Jared Wadsworth \n-   (Changed) Fertilizer controls. \n\n### Version 1.25 - (2016) Jared Wadsworth \n-   (Fixed) Addressed settings issue with Fertilizer controls. \n-   (Added) Support for standard planter section control. \n\n### Version 1.21 - (2016) Jared Wadsworth \n-   Initial 2015 software release, upgrade to newest version. \n\n### Version 1.04-1.09 - (2016) Jared Wadsworth \n-   Transitional software, upgrade to newest version! \n\n### Version 1.03 - (2015) Keith Mecham \n-   Prototype software, upgrade to newest version! \n-->", "S4B": "<h1>Beet Harvester (S4B) Models: 3060, 3080, 3120<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:cameron.neff@spudnik.com\">Cameron Neff em<\/a>, <a href=\"208-239-5738\">208-239-5738 tl<\/a> / <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a><\/p>\n<h2>Stable release 2.02 (3 Oct 2023) <!--Cameron Neff--><\/h2>\n<ul>\n<li>(Added) Ability to control the boom on/off or speed from the screen and joystick.<\/li>\n<li>(Changed) The load sense calculation includes the tractor pressure, and adjusts based on difference.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.01 (26 Oct 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Added) Adjustment for the rear leveling speed when row finder leveling is enabled.<\/li>\n<li>(Changed) The leveling delay time was reduced when row finder auto is enabled. <\/li>\n<\/ul>\n<h3>Version 1.55 (22 Oct 2020) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Changed) Complete rework of the user interface for the 3120.<\/li>\n<li>(Changed) Simplified and improved controls for the 3120.<\/li>\n<\/ul>\n<!--\n### Version 1.29 - (2016-Nov-12 13:26) Cameron Neff \n-   (Changed) Timing of the paddle shaft and hydraulic puller wheels to be based off the Digger Auto button press again. \n### Version 1.28 - (2016-Nov-9 12:26) Cameron Neff \n-   (Fixed) Machine running time not being recorded properly. \n-   (Changed) Increased ranges for row finder steering. \n### Version 1.27 - (2016-Nov-4 14:48) Cameron Neff \n-   (Added) New user modes for row finder and drawbar control. \n-   (Added) Alarm for axial roller over-pressure states. \n-   (Added) Controls to manually lift the hopper fill elevator. \n-   (Removed) Check box for machine row finder leveling mode. \n-   (Changed) Starting trigger for paddle shaft and hydraulic puller wheels is PTO and elevator. Before the trigger was the digger auto button. \n### Version 1.26 - (2016-Oct-30 10:12) Cameron Neff \n-   (Changed) Increased speed at which digger auto lowers and raises the drawbar. \n-   (Changed) Reduced delay for paddle shaft and hydraulic puller wheel start-up times. \n-   (Changed) Minimized row finder ground detection value. (For shallow digging depths) \n-   (Changed) Limited upper range of tank fill ultrasonic sensor calculation.\n### Version 1.25 - (2016-Oct-24 15:59) Cameron Neff \n-   (Added) Button to enter the row finder sensor minimums and center points. \n-   (Added) Check box to enable machine leveling based on the row finder positions. \n-   (Fixed) Row finder targets for each of the presets not working correctly. \n### Version 1.24 - (2016-Oct-20 10:38) Cameron Neff \n-   (Fixed) Spiral axial rollers turning off when switching between modes. Only smooth rollers stop and change direction. \n-   (Changed) Delayed row finder leveling control for about 10 seconds after the machine Digger Auto button has been released. \n-   (Changed) Row finder auto will not allow drawbar steering unless both sensors are within a specific window (l/r and up/dn). If one of the sensors goes out of range the steering won\u2019t move. \n-   (Changed) Digger Auto dependency of some of the non-intake drive functions. \n### Version 1.23 - (2016-Oct-14 11:13) Cameron Neff \n-   (Changed) Using the drawbar up and down button while in dig mode will adjust the row finder depth set point and not take it out of auto. \n-   (Changed) The speed input for the turbine is now in RPM and not %. The controller will now try and maintain that speed set point. \n-   (Added) Built in a pressure hysteresis into the boom drive. \n-   (Added) Machine Digger Auto button on the dash and joystick that is used for putting the machine into and out of the ground. \n### Version 1.22 - (2016-Oct-11 17:20) Cameron Neff \n-   (Changed) Start-up timing to fix the axial rollers starting too soon. \n### Version 1.11 \u2013 (2015) Cameron Neff \n-   Prototype testing software for 2015 3060 machine. \n-->", "S4C": "<h1>Air Sep Harvester (S4C) - Models: 6621 (2 row), 6631 (3 row)<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:cameron.neff@spudnik.com\">Cameron Neff em<\/a>, <a href=\"208-239-5738\">208-239-5738 tl<\/a> / <a href=\"mailto:chad.cole@spudnik.com\">Chad Cole em<\/a>, <a href=\"tel:208-239-5789\">208-239-5789 tl<\/a><\/p>\n<h2>Stable Release 2.12.12 (26 Sep 2024) <!--Cameron Neff--><\/h2>\n<ul>\n<li><em>Important! When updating to this version from an earlier version, some user data and preset settings will be lost.  Some form of recording prior settings is suggested.<\/em><\/li>\n<li>(Added) First release for use with production funneling airsep harvesters.  S4 software configuration options, 66x1-4.  Not valid with pre-2020 prototype machines.<\/li>\n<li>(Added) 6631-4 only.  Rock conveyor speed controls are from the display not a tractor remote.  <\/li>\n<li>(Added) 66x1-4 only.  Angle chain speed controls on the Digger page.<\/li>\n<li>(Added) Electric airsep fan speed controls on the Misc page.<\/li>\n<li>(Added) S4 software configuration options added for different primary chain drives.<\/li>\n<li>(Fixed) S4 software configuration option for telescoping boom reversed.<\/li>\n<li>(Fixed) Diagnostic pages corrected to better display only the specific configuration's information. <\/li>\n<li>(Fixed) Outputs on expansion cards show connection status in diagnostics.<\/li>\n<li>(Changed) S4x expansion card software updated.<\/li>\n<li>(Changed) Rock conveyor reverse control button on the display is now momentary and independent of the user set reversing time.<\/li>\n<li>(Changed) The elevator professional multisep table reverse button on the display is now momentary and independent of the user set reversing time.<\/li>\n<li>(Changed) The self-hydraulic oil cooler fan control was modified to allow for reversing more often.<\/li>\n<li>(Changed) Reduced delay time of most alarms.<\/li>\n<li>(Changed) Improved startup time for upper simple sep roller.<\/li>\n<li>(Changed) Decreased machine leveling sensitivity when machine is not in a digging state.<\/li>\n<li>(Changed) Improved starting behavior of swinging holding tank fill elevator chain drive.<\/li>\n<li>(Changed) The display representation of the airsep grid angle was changed to better represent the actual movement of the grid.  Some older machines may require further adjustment.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.10 (16 May 2023) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Added) First release with John Deere Electric Motor configuration added.<\/li>\n<\/ul>\n<h3>Version 2.08 (29 Aug 2022) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Added) Additional alarms for right hand side secondary, trash conveyor, and holding tank piler chain.<\/li>\n<li>(Fixed) Boom start/stop button on VT not working outside of RUN button activation.<\/li>\n<li>(Changed) Behavior of the non-swinging holding tank.  Only down movement when emptying, and force down after so long of emptying.  Piler only moves up when filling.<\/li>\n<li>(Changed) Swinging holding tank piler chain control is now in fpm not RPM.<\/li>\n<li>(Changed) Control of upper and lower simple separator roller speed. <\/li>\n<\/ul>\n<h3>Version 2.07 (29 Sep 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Fixed) Holding tank piler behavior when chain stops.<\/li>\n<li>(Fixed) Rollerstar side elevator table drive test PWM.<\/li>\n<li>(Changed) Auto machine leveling while not in digging mode.<\/li>\n<\/ul>\n<h3>Version 2.06 (17 Sep 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Changed) Holding tank piler and floor behavior when unloading.<\/li>\n<li>(Changed) Removed manual inputs for Professional side elevator clod roller minimums, leveling, and holding tank.<\/li>\n<li>(Changed) Airsep grid angle graph.<\/li>\n<\/ul>\n<h3>Version 2.05 (8 Sep 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Added) All boom controls for the swinging holding tank have user configurable maximums.<\/li>\n<li>(Changed) Holding tank piler chain control independent of the side elevator.<\/li>\n<li>(Changed) Holding tank piler and floor behavior when unloading.<\/li>\n<li>(Changed) Professional side elevator table controls when switching between clean and transport.<\/li>\n<li>(Changed) Minimum gap and height for side elevator are sensor values not percentages.<\/li>\n<li>(Changed) Speed input value for upper and lower simple seperators are RPM not percentages.<\/li>\n<li>(Changed) Boom and holding tank piler chain speed readings switched.<\/li>\n<\/ul>\n<h3>Version 2.04 (16 Aug 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Fixed) Boom swing not working with the joystick.<\/li>\n<li>(Changed) Updated the software for the inputs to fix incorrect analog calculations.<\/li>\n<\/ul>\n<h3>Version 2.03 (20 Jul 2021) <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Fixed) Improved error checking and retrieval for items saved in FRAM.<\/li>\n<li>(Fixed) Selected machine number now shows up in the information screen.<\/li>\n<li>(Fixed) Professional elevator table minimum height and gap values were not saving through a power cycle.<\/li>\n<li>(Fixed) Holding tank fill elevator up speed setting value was not saving through a power cycle.<\/li>\n<li>(Changed) Modified controls for holding tanks with Hawe valve banks.  Mainly for the tank floor and elevator controls.<\/li>\n<li>(Changed) Modified the code used to calculate some of the holding tank sensors.<\/li>\n<li>(Changed) Updated some of the configuration screen data.<\/li>\n<\/ul>\n<h3>Version 2.02 (10 Jun 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Added) Adjustable min gap and min height settings for transport mode<\/li>\n<li>(Added) The boom piler chain can now be ran in test mode without \"RUN\" being activated.<\/li>\n<li>(Added) A positive and negative configuration for the grid shaker so the pot can be installed away from rock conveyor<\/li>\n<li>(Fixed) Going below minimum blower speed will now disengage the clutch again<\/li>\n<li>(Fixed) The display will no longer show machine in transport mode unless actually in transport mode<\/li>\n<li>(Fixed) Telescope boom buttons will now function even if there is no swinging boom<\/li>\n<li>(Changed) Unable to enter transport mode if below minimum gap or height settings<\/li>\n<li>(Changed) Minimum default blower speed changed from 1500 rpm to 800 rpm<\/li>\n<li>(Changed) Scaled the max piler up setting controls for better control range<\/li>\n<\/ul>\n<h3>Version 2.01 (17 May 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Added) Teach Level button in Axle Settings<\/li>\n<li>(Added) Control to start the piler drive independently<\/li>\n<li>(Added) Professional Multisep display to the configurable controls<\/li>\n<li>(Added) Control to set the maximum speed the piler can rise<\/li>\n<li>(Fixed) Home screen settings are now fully configurable<\/li>\n<li>(Changed) Several minor display changes to improve ease of use<\/li>\n<\/ul>\n<h3>Version 1.36 (19 Aug 2019) <!--Nick Huskinson--><\/h3>\n<ul>\n<li>(Added) Telescoping boom option<\/li>\n<li>(Added) New pressure coulter function for 2019 option<\/li>\n<li>(Fixed) Increased the time the holding tank floor moved<\/li>\n<li>(Fixed) Start and stop hydraulic primary when clutch is turned on<\/li>\n<li>(Changed) Replaced pressure switch with a transducer for Wheel Assist<\/li>\n<li>(Changed) Allowed PTO sensor to be ignored when PTO Speeds is set to 0<\/li>\n<\/ul>\n<!--\nVersion 1.35 (2018-Jul-18) Nick Huskinson\n(Added) Slip clutch functionality to the hydraulic primary drive system.\nVersion 1.34 (2017-Aug-23) Nick Huskinson\n(Fixed) Enabled the rear cross and side elevator alarm for mechanically driven chains\n(Changed) Increased how often the rear cross alarm will beep\nVersion 1.33 (2017-Jul-15) Nick Huskinson\n(Added) Controls for hydraulic primary chains\n(Fixed) Made the holding tank piler dependent on the Run button\n(Changed) Adjusted Digger nose compensation for 6621 to keep nose parallel to the ground\n(Added) Roller Star Table as a config option\n(Added) automatic adjustment to the professional multisep tables\nVersion 1.32 \u2013 (2016-Oct-14 15:25) Cameron Neff\n(Changed) Drives are now simultaneously started using ramp-up instead of a timed sequence.\n(Changed) Elevator table shut off time quicker.\nVersion 1.31 \u2013 (2016-Oct-7 16:29) Cameron Neff\n(Fixed) Auto leveling issues when one cylinder is either completely retracted or extended.\n(Fixed) Prevents differences in the leveling cylinders from being more than 33(6621) or 40(6631) as displayed on the VT screen.\n(Fixed) Reversed outputs for the elevator table gap adjustment.\n(Fixed) Sensor reading for the elevator table gap.\n(Changed) 2015 holding tank should always lowering the fill elevator when folding the boom.\n(Removed) Math for the leveling compensation that was added in 1.30.\nVersion 1.23 \u2013 (2016-Aug-23) Cameron Neff\n(Changed) Decreased upper simple-sep drive start-up delay time.\nVersion 1.22 \u2013 (2016-Aug-18) Cameron Neff\n(Added) New diagnostic and settings screens.\n(Added) functioning preset buttons.\n(Changed) Machine configuration menu.\n(Fixed) Joystick remapping functionality.\nVersion 1.11 \u2013 (2016-Jun-9) Cameron Neff\n(Changed) Elevator table drive control change. Early 2016 harvesters.\nVersion 1.10 \u2013 (2015-Dec-11) Cameron Neff\n(Changed) Contains control modifications for improved machine behavior. Final 2015 update.\n-->", "S4D": "<h1>Potato Windrower (S4D) - Models: 6142 (4 row) / 6160 (6 row) / 6180 (8 row folding)<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a> / <a href=\"mailto:chad.cole@spudnik.com\">Chad Cole em<\/a>, <a href=\"tel:208-239-5789\">208-239-5789 tl<\/a><\/p>\n<h2>Stable release 2.06 (10 Apr 2023)<\/h2>\n<ul>\n<li><strong>NOTES:<\/strong> no configuration options changed in this update if updating from 1.14 or later. Do not install on 6180s with SNs prior to 6180-55-29. This is the last version that will include support for 5640 windrowers. Use this version or older for 5640s.<\/li>\n<li><strong>WARNING:<\/strong> <em>Do not install on 6180s with SNs prior to 6180-55-29.<\/em><\/li>\n<li>Summary of changes:<ul>\n<li>(Fixed) Compute machine run hours for display on S4 board<\/li>\n<li>(Fixed) Start/End Row functionality - some functions were not working<\/li>\n<li>(Fixed) Correct joystick map code for non-working joystick assignments<\/li>\n<li>(Fixed) Removed R/L setpoint button press handling; not needed<\/li>\n<li>(Changed) CX3 text changes for clarity<\/li>\n<li>(Changed) S4 Config menu updated to hide options that don't apply<\/li>\n<li>(Changed) 6180 rear cross/folding logic to match redesigned rear cross beginning with 6180-55-29. Do not use on machines with earlier serial numbers.<\/li>\n<li>(Changed) Removed unused Left 3rd Coulter option from configuration. \"3rd Coulter\" option is used whether it's on the left, right, or both. Machines manufactured before 2017 that have a left 3rd Coulter option should use version 2.04 or earlier.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.04 (9 Sep 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Start of row/setpoint issue with 6160 double discharge<\/li>\n<\/ul>\n<h3>Version 2.03 (24 Sep2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) CX3 bug that prevented long press on button in position 5 from working<\/li>\n<\/ul>\n<h3>Version 2.02 (25 Aug 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Added) CX3 code for LCD screen brightness if light sensor is missing<\/li>\n<\/ul>\n<h3>Version 1.14 (2020) <!--Nick Huskinson--><\/h3>\n<ul>\n<li>Last release prior to updates for S4 boards v6 (Use for all v4 or older boards)<\/li>\n<\/ul>", "S4E": "<h1>Crop Cart (S4E) - Models: 4820, 4835<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:cameron.neff@spudnik.com\">Cameron Neff em<\/a>, <a href=\"208-239-5738\">208-239-5738 tl<\/a> / <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a><\/p>\n<h2>Stable release 2.02 (1 Oct 2021) <!--Cameron Neff--><\/h2>\n<ul>\n<li>(Added) Software update for use with the rev6 S4 control boards.<\/li>\n<li>(Added) Self-Hydraulic carts can turn the main belt on/off from a button on the joystick.<\/li>\n<li>(Changed) Main belt control values to provide a wider range of control.<\/li>\n<li>(Changed) Outputs when auger configuration is selected.<\/li>\n<li>(Changed) Compost spreader max PWM control value.<\/li>\n<li>(Removed) Spreader roller control from CX3 when the auger configuration is selected.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 1.20 (31 Jan 2019)  <!--Cameron Neff--><\/h3>\n<ul>\n<li>(Changed) Modified the controller and switchbox software to communicate according to the ISO standard.<\/li>\n<\/ul>\n<!--\n-   (Changed) General functionality updates to the seed loader control.\n### Version 1.18 (2 Feb 2018)  Cameron Neff\n-   (Added) Controls for Hawe proportional hydraulic valves.\n-   (Fixed) Joystick response issues.\n-   (Added) Controls for seed loader extension direction.\n-   (Changed) General functionality updates.\n### Version 1.15 (2017-Jul-18)  Cameron Neff\n-   (Added) Control of extra tip-out on some potato booms.\n-   (Changed) Minimum main belt pressure setting and default.\n### Version 1.13 (2017-Apr-28)  Cameron Neff\n-   (Added) Electronic controls for prototype seed loader attachment. \n-   (Added) Choose boom type from the CX3. \n### Version 1.12 (2017-Mar-14)  Cameron Neff\n-   (Added) Software for adding Joystick and joystick remapping. \n-   (Added) Control for new non-variable main drive motors. \n-   (Changed) Main belt reverse warning and switch. \n### Version 1.10 (2016-Sep-16)  Cameron Neff\n-   (Added) Electronic controls for 4820 with auto folding boom door open and close. \n### Version 1.09 (2016-Jul-12)  Cameron Neff\n-   (Added) Update for grain auger option and hopper sensor. \n### Version 1.08 (2016-Jun-14)  Cameron Neff\n-   (Added) Software update for 4820 and 4835 with variable main belt drive. \n-   (Added) Controls for telescoping boom option. \n-   (Added) Includes CX3 function remapping. \n-   (Changed) Machine configuration menu removed from CX3 and added to main S4. \n-->\n<h3>Version 1.03 (2015-Oct-21)  <!--Cameron Neff--><\/h3>\n<ul>\n<li>Software version for early manufactured 4835 machines with 3-spd main belt drive. <\/li>\n<\/ul>", "S4F": "<h1>Evenflow 1872 (S4F)<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ryan.wasden@spudnik.com\">Ryan Wasden em<\/a>, <a href=\"tel:208-239-xxxx\">208-239-xxxx tl<\/a><\/p>\n<h2>Stable release 2.21 (2022) <!--Jack Yorgesen--><\/h2>\n<ul>\n<li>(Changed) Version for 1860 style boom with breakaway bars and overhead ultrasonic sensors<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 1.18 \u2013 (2020) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Fixed) CX1 E-stop works on all pages now<\/li>\n<li>(Added) Smoother discharge belt operation with the addition of one input, older machines still function without input<\/li>\n<\/ul>\n<!--\n### Version 1.13 \u2013 (2019) Devin Vollmer\n-   (Added) Function for Drop point at bottom of the tub to stop trying to go down.\n-   (Changed) Pid Parameters for boom control to be smoother. \n### Version 1.12 \u2013 (2019) Devin Vollmer\n-   (Added) Function for min boom down for shutting discharge off \n### Version 1.11 \u2013 (2018) Devin Vollmer\n-   (Added) Pid control for bottom discharge belt to get belt running better.  \n### Version 1.05 \u2013 (2016) Keith Mecham\n-   (Changed)\n### Version 1.02 \u2013 (2015) Keith Mecham\n-   (Changed)\n-->", "S4G": "<h1>Legacy Potato Harvester (S4G) - Models: 5740, 5744, 5746, 6630, 6640<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:chad.cole@spudnik.com\">Chad Cole em<\/a>, <a href=\"tel:208-239-5789\">208-239-5789 tl<\/a> / <a href=\"mailto:cameron.neff@spudnik.com\">Cameron Neff em<\/a>, <a href=\"tel:208-239-5738\">208-239-5738 tl<\/a><\/p>\n<h3><strong>NOTE: NOT RECOMMENDED FOR 6740<\/strong>, use the latest stable version of 6740 specific (S4P) software instead.<\/h3>\n<h2>5744 model specific release 2.29 (29 Feb 2024)  <!--Chad Cole - removed computation for voltage angle sensor--><\/h2>\n<ul>\n<li><strong>NOTE:<\/strong> This fix is only needed for 5744 with rear crosss and/or side elevator pintle table.<\/li>\n<li>(Fixed) Shear roller guages not working.<\/li>\n<\/ul>\n<h2>Stable release 2.27 (15 Sep 2022)<\/h2>\n<ul>\n<li>(Fixed) 6740 Standard and indep digger nose - remove power down to setpoint in auto mode. Float down only in auto mode.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.26 (19 Aug 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Removed extra \"TRANSFER\" button sometimes displayed on TABLES page<\/li>\n<li>(Fixed) Range scale computation for Angle/Gap/Height for MS Pro table<\/li>\n<li>(Fixed) Hide PWM setpoints for hydraulic rear cross and elevator chain for 6740<\/li>\n<li>(Fixed) Add condition to turn off side elevator table chain when PTO speed is below target speed<\/li>\n<li>(Fixed) Update display to include boom speed on SPEEDS and BOOM pages<\/li>\n<li>(Fixed) Removed speed display for shakers, only PWM input is needed<\/li>\n<\/ul>\n<h3>Version 2.25 (25 Jul 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) PWM issue for Professional MS table on 6740 - Segment Roller REV button didn't work reliably; changed PWM value for REV to match AUTO (forward) value.<\/li>\n<\/ul>\n<h3>Version 2.24 (12 Jul 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Joystick bug/memory issue<\/li>\n<\/ul>\n<h3>Version 2.22 (24 Jun 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>Use 2.24 with joystick; 2.22 may not boot up with joystick connected<\/li>\n<li>(Added) Primary Chain speed to Speed page<\/li>\n<li>(Modified) Table display for StarSep and Finger tables - removed unneeded PWM setting<\/li>\n<li>(Fixed) Position of Start of Row settings page to fix truncated left side of page<\/li>\n<\/ul>\n<h3>Version 2.21 (5 Apr 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>Use 2.24 with joystick; 2.21 may not boot up with joystick connected<\/li>\n<li>(Added) Auto and Transport buttons for 6740 STARSEP side elevator table (previously a manual control)<\/li>\n<\/ul>\n<h3>Version 2.20 (25 Mar 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>Use 2.24 with joystick; 2.20 may not boot up with joystick connected<\/li>\n<li>(Added) 6740 Boom and Piler speed set points (%) on Boom and Speeds pages<\/li>\n<\/ul>\n<h3>Version 2.19 (22 Mar 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Added) 6740 StarSep table adjustments<\/li>\n<li>(Added) Primary chain speed display on home page<\/li>\n<\/ul>\n<h3>Version 2.18 (14 Mar 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Added) 6740 Outside Depth Wheels option<\/li>\n<li>(Fixed) Finger table speed control<\/li>\n<li>(Fixed) Minor code cleanup<\/li>\n<\/ul>\n<h3>Version 2.17 (18 Feb 2022) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Changed) Prof MS table rollers - speed controls switched to straight PWM<\/li>\n<li>(Fixed) Boom fold issue when folding with joystick<\/li>\n<li>(Fixed) CCI Display issues<\/li>\n<li>(Fixed) Independent Digger nose setpoint entry<\/li>\n<li>(Added) StarSep Elev Table<\/li>\n<\/ul>\n<h3>Version 2.16 (25 Aug 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Added) Functionality for swinging holding tank<\/li>\n<\/ul>\n<h3>Version 2.14 (9 Aug 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Prof MS transfer mode not working for 6640<\/li>\n<li>(Fixed) Some values not saved to memory<\/li>\n<li>(Fixed) Elevator controls<\/li>\n<li>(Fixed) Spreader roller computation<\/li>\n<\/ul>\n<h3>Version 2.10 (14 Jul 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Alarm cutoffs for 5744 Pintle System option now trigger correctly.<\/li>\n<\/ul>\n<h3>Version 2.09 (30 Jun 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Error in PinDef IO for DIGGER_L_FLOAT. This was inadvertently disabled. It's enabled in this version.<\/li>\n<\/ul>\n<h3>Version 2.08 (28 Jun 2021) <!--Chad Cole--><\/h3>\n<ul>\n<li>(Fixed) Boom fold controls now display correctly on the 6640.<\/li>\n<\/ul>\n<h3>Version 2.07 (2021-06-22) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Fixed) Independent spreader controls are now working on the 6740.<\/li>\n<li>(Changed) Clod roller ratio speed can now go up to 200% on the elev. table.<\/li>\n<\/ul>\n<h3>Version 2.06 (18 May 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Changed) Min height and gap elev. multisep settings now only affects transport mode.<\/li>\n<li>(Added) Aux wheel pressure diagnostic input to axle tab when aux wheel config is selected.<\/li>\n<li>(Fixed) Bar graphs on pintle belt tab now function correctly.  Previously always showed at 0.<\/li>\n<\/ul>\n<h3>Version 2.05 (12 May 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Changed) FWMS controls to completely match the Elev table multisep controls<\/li>\n<li>(Fixed) Initial start speeds on the Elev and FWMS segment and clod drive<\/li>\n<li>(Fixed) Initial start speeds on the piler up controls<\/li>\n<li>(Fixed) Swinging Holding Tank floor controls will now have enough pressure to move when required.<\/li>\n<li>(Changed) The swinging boom piler will now only be able to move up when the holding tank floor is not moving<\/li>\n<li>(Changed) Pinch is now the default mode on the FWMS and elev tables and transfer can be activated which is reverse of what it was.<\/li>\n<\/ul>\n<h3>Version 2.04 (4 May 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Changed) Elev table multi-sep controls to a percentage to match the FWMS.<\/li>\n<li>(Fixed) Clod ratio controls on the 66X0 models.<\/li>\n<\/ul>\n<h3>Version 2.03 (26 Apr 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Fixed) Tested and tuned the min height and gap settings on elevator table multisep<\/li>\n<li>(Fixed) Errant displays that shouldn't show up with certain configurations<\/li>\n<li>(Fixed) Auto digger nose adjust is stopped during manual control<\/li>\n<li>(Added) Controls to run the piler independently. <\/li>\n<\/ul>\n<h3>Version 2.02 (22 Mar 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Fixed) Hump adjustment interference safety on the 6740M/L <\/li>\n<li>(Fixed) Errant displays that shouldn't show up with certain configurations<\/li>\n<li>(Added) Adjustable minimum settings for gap and height on the multisep<\/li>\n<li>(Added) Adjustable Max settings for the joystick boom controls<\/li>\n<li>(Added) Hump adjustment interference safety on the 6740M/L <\/li>\n<\/ul>\n<h3>Version 1.28 (15 Mar 2021) <!--Jason Steffen--><\/h3>\n<ul>\n<li>(Added) Controls for support wheel<\/li>\n<li>(Added) Clod Control ratio based on segment speed<\/li>\n<li>(Added) Wheel Drive controls<\/li>\n<li>(Changed) Multi-Sep Controls<\/li>\n<li>(Changed) Wheel Drive GUI<\/li>\n<li>(Fixed) Boom speeds for hawe valves<\/li>\n<\/ul>\n<!--\n### Version 1.26 (28 Feb 2018) Nick Huskinson\n- (Changed) Display button appearance \n- (Added) Slip detection for rear pintle belts \n- (Added) Hydraulic primary behaves like a slip clutch \n- (Added) 5766 option made available \n- (Added) Support for HAWE valves \n- (Added) Wheel drive \n- (Added) Software version displayed on the display \n- (Fixed) Shear rollers adjust range when button is pressed \n- (Changed) Hydraulic Primary pressure setting sets slip \n  pressure \n- (Fixed) Disable pintle alarm when no elevator pintle table \n  present on 5744 \n- (Changed) Only load new object pool when a new version is\n  detected \n- (Changed) Oil cooler reverses every 30 minutes the PTO runs\n### Version 1.25 (15 Jul 2017) Nick Huskinson\n-   (Security) Holding tank piler needs harvester run to be enabled to move\n-   (Changed) removed auto dig depth button and added controls to go to preset depth and follow it\n-   (Added) Independent control for digger nose\n-   (Added) Ability to name/rename the preset buttons\n-   (Changed) All automatic movement is dependent on the harvester run button\n-   (Changed) Mechanical shakers can be adjusted when PTO is not running\n-   (Added) Terra float to start/end of row\n-   (Changed) Seperated the start/end of row pages\n-   (Changed) Coulter sync is now persistent across power cycles\n-    (Added) Elevator table multisep controls for 5744\n-    (Fixed) CCI not loading S4 controls\n-    (Added) Electronic slowdown capability for proportionaly controlled booms\n### Version 1.23 (12 Sep 2016) Nick Huskinson\n-   (Added) Alarms added to the pintle system \n-   (Added) Alarm toggle added to hydraulic rear cross and elevator controls \n-   (Changed) Terra Float drive made dependent on PTO running \n-   (Fixed) Intake Chain pressure dependencies increased 400psi \n-   (Added) Aux wheel up/down added to start/end row \n-   (Changed) Boom alarm to a double beep every 5 seconds \n### Version 1.22 \u2013 (2016) Nick Huskinson\n-   (Added) 5746 controls added (Fixed) Updated CCOC \n-   (Removed) Removed options for joystick buttons that were not available \n-   (Fixed) Added stripper kit and synced coulter control to joystick \n-   (Added) Individual drive override added to Auto buttons, when held \n-   (Added) AUTO buttons added to user interface to allow for test functionality \n-   (Fixed) Update the Aux Wheel with pressure control from the CCI \n-   (Added) Enabled the Digger Hump to be calibrated \n### Version 1.21 \u2013 (2016) Nick Huskinson\n-   (Fixed) Joystick customized controls persistent across power cycles \n-   (Fixed) Mechanical shaker and secondary shaker controls updated \n-   (Added) Sensor Calibration added \n-   (Fixed) Full width multi-sep controls and labels adjusted \n-   (Fixed) Terra float controls updated to use ridge relief \n### Version 1.20 \u2013 (2016) Nick Huskinson\n-   Initial release for 2016 Season \n### Version 1.06 \u2013 (2015) Cameron Neff-->", "S4H": "<h1>Pilers (S4H) - Models: 880<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ryan.wasden@spudnik.com\">Ryan Wasden em<\/a>, <a href=\"tel:208-239-xxxx\">208-239-xxxx tl<\/a><\/p>\n<h2>Stable release 2.02 2.62 \u2013 (2022) <!--Jack Yorgesen--><\/h2>\n<ul>\n<li>(Added) Configuration for joystick remote to be compatible with older V1000 VFD's<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.58 \u2013 (2021) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Added) Version for the new piler remote, backwards compatible with old remote<\/li>\n<\/ul>\n<h3>Version 1.55 \u2013 (2020) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Changed) Service bulletin to increase swing speed<\/li>\n<\/ul>\n<!--\n### Version 1.54 \u2013 (2020) Devin Vollmer\n-   (Changed) Service bulletin to fix remote messages.\n### Version 1.11 \u2013 (2017) Devin Vollmer\n-   (Changed)\n### Version 1.09 \u2013 \n-   (Changed)\n-->", "S4I": "<h1>Air Sep Eliminator (S4I) - Models: 994, 991<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ryan.wasden@spudnik.com\">Ryan Wasden em<\/a>, <a href=\"tel:208-239-xxxx\">208-239-xxxx tl<\/a><\/p>\n<h2>994 LED keypad versions (Only use on LED keypad versions)<\/h2>\n<h3>Version 3.50 - (2022) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Added) CANBUS Device version to work with keypads, dials, and V700 screen<\/li>\n<li>(Changed) Rear Cross now does not change directions based on Interlock plug, instead machine will check the interlock on the direction side it is going to<\/li>\n<\/ul>\n<h2>994 with switches 2019-2021 (Do not use on 2018 or 2017 model)<\/h2>\n<h3>Version 2.02 \u2013 (2021) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Added) dirt cross and rock cross speed adjustability in the settings page, start at 30% for each and adjust from there<\/li>\n<li>(Fixed) fan speed decrease now matches fan speed increase, also now increments by 10 instead of 5 <\/li>\n<li>(Changed) Clod rolls now never fault out the machine, Segments move the product so they will fault it out if there's an issue<\/li>\n<li>(Changed) Various slight speed increases to cylinder functions like table up<\/li>\n<\/ul>\n<h2>994 2019 version (Do not use on 2018 or 2017 model)<\/h2>\n<h3>Version 1.33 \u2013 (2019) <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(New Model) 994 fall 2019 machines do not use on 2018 machines.<\/li>\n<\/ul>\n<h2>994 2018 version (Do not use on 2019 or 2017 model)<\/h2>\n<h3>Version 0.33 \u2013 (2018) <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(2018)(Fixed) Fixed clod roller pid so when moving gap rollers will not stop. <\/li>\n<\/ul>\n<h2>994 2017 version (Do not use on 2019 or 2018 model)<\/h2>\n<h3>Version 1.25 \u2013 (2017) <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(2017) First model year of 994 (this is single blower for airsep model). <\/li>\n<\/ul>\n<h2>991 Software<\/h2>\n<h3>Version 1.11 \u2013 (2022) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Changed) 991 rewritten to be compatible with newer rev. 6 S4 boards, this version will work with older boards as well    (rev. 6 S4 version)<\/li>\n<\/ul>\n<h3>Version 1.08 \u2013 (2017) <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(Changed) Last version of 991 Eliminator do not use on 994 machines only 991 or small frame 994 without hawe valves.<\/li>\n<\/ul>\n<!--\n### Version 1.07 \u2013 1.02\n-   Initial versions\n-->", "S4K": "<h1>Folding Planter (S4K) - Models: 83xx<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:jacob.christiansen@spudnik.com\">Jake Christiansen em<\/a>, <a href=\"208-589-2608\">208-589-2608 tl<\/a><\/p>\n<h2>Stable Release 2.16 (Aug 2025) <!--Jake Christiansen--><\/h2>\n<ul>\n<li>(feature) Adds wing output diagnostics<\/li>\n<li>(fix) Adjusts audio alarms for row controls<\/li>\n<\/ul>\n<h2>Beta Release 2.16 (Nov 2024) <!--Nathan Yost--><\/h2>\n<ul>\n<li>(fix) fixed alarm priority of consecutive skip alarm because it wouldn't alarm if skip error was over skip error limit<\/li>\n<li>(fix) Max wing down feature wouldn't work if set to higher than the wing unfold set point. It will disable down in this scenario<\/li>\n<li>(fix) Sensor disconnected alarm would show up for sensors not active in certain modes.<\/li>\n<li>(fix) Tilt setable range was too low so it would reset tilt on startup increased this range by 4mA to each side.<\/li>\n<li>(Removed) Removed 2 sensor mode button for depth control on wings and making it a standard feature so planter will always use 2 sensors on the wings instead of 3.  <\/li>\n<li>(feature) Button in Depth Control Settings to set graphs to 0-100% for when wheels are used as depth control.<\/li>\n<li>(Removed) Removed the planting stats of spacing and potatoes per acre from the home screen.<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h2>Beta Release 2.15 (March 2024) <!--Nathan Yost--><\/h2>\n<ul>\n<li><strong>WARNING:<\/strong> <em>Do not install on machines manufactured before 2019. See version history below.<\/em><\/li>\n<li>(change) Condensed User interface controls and reduced complexities with the calibrating wings method<\/li>\n<li>(Feature) Added fixed frame for both 8312 and 8308 that includes a new pot tilt sensor for each wing won't be available unless sensors are connected<\/li>\n<li>(feature) Added 2 sensor mode for wings that does depth control with 2 sensors versus 3 that is enabled in depth control settings<\/li>\n<li>(fix) Feedbowl setpoints were misaligned and are now working properly<\/li>\n<li>(fix) Fixed Hopper fold function folding with potatoes still inside the hopper becuase potatoes were in sensor deadband<\/li>\n<li>(revert) Change wing tilt back to using a PID control becuase it performs better than a fixed speed<\/li>\n<li>(feature) Added feedchain wing proximity sensor that alerts operator when wing is all the way down and foward. Also allows the main wing to go below normal setpoint when unfolding and then come back up when feedchain wing is in position. Used to help avoid damage to wing feedbowls<\/li>\n<li>(improvement) Added resolution for the tilt and wing fold sensors so we have better resolution for fixed frame mode.<\/li>\n<li>(feature) added CAN ability for current controlled distribution block outputs and Telematics data. Default is disabled<\/li>\n<li>(feature) Added new sensor disconnected feature for all wing control and depth control sensors<\/li>\n<li>(fix) gps speed was affected by wheel circumference so fixed this so it isn't affected by the wheel circumference.<\/li>\n<\/ul>\n<h3>Version 2.12 (March 2023) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) feedchain max off and max on time was double the actual time. Example 2 seconds was actually 4 seconds. This was fixed to match actual time<\/li>\n<li>(fix) error with alarms stuck on for when specific rows are disabled. This is fixed so that alarms only occur on enabled rows<\/li>\n<li>(feature) Added in feature to retract disks when folding wing down. This addresses an issue where the disc bled out and unfolded and when the wing was unfolded it hit the row units<\/li>\n<li>(fix) Shakers weren't able to run unless feedbowls are enabled. This is now fixed so you can run shakers anytime the cup drive is on.<\/li>\n<li>(improvement) Hopper would fold up at times when potatoes in sensor deadband. This is better but not fixed yet.<\/li>\n<li>(fix) Wheel drive oil cooler not running fan a proper cooling speed for temperature<\/li>\n<li>(fix) Added in new skip detection software that seems to be reliable.<\/li>\n<li>(fix) disable the hour and acre counters while using test ground speed mode<\/li>\n<li>(fix) Hidden row feature had a bug where it was always stuck on. It is now fixed to shut off encoder speed when all rows are off<\/li>\n<li>(fix) For 8308 fixed frame feature added the functionality to chase the setpoint of the wing depth while planting because wings would get pushed up while planting and entering a row.<\/li>\n<\/ul>\n<h3>Version 2.07 (Febuary 2023) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(feature) Added a fixed frame configuration for 8308 where Angle sensors are added to the wings which allows it to always unfold to the same position and act as a rigid 8 row frame while planting. <\/li>\n<li>(fix) There was a bug that made it so the rows didn't show up if the screen got power cycled or disconnected and the S4 didn't. This should be fixed so the rows always populate<\/li>\n<li>(Change) Cleaned up the Virtual Terminal calibration page to simplify the wing calibration process. All wing calibrations are found in the \"Enter Wing Sensor Calibration\" page. You can set your fixed frame by holding down the \"Hold to Set Fixed Frame\" button in Depth control settings. Sensor calibration will only change in this page when previously it would change at any time it when out of it's range.<\/li>\n<\/ul>\n<h3>Version 2.06 (August 2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) Skip detection issues where row 7-9 had more skips.<\/li>\n<li>(fix) Fixed issue with floating toolbar.<\/li>\n<li>(Feature) Added ability to add a john deere volt axle steering sensor.<\/li>\n<li>(Feature) Ability to boost speed of toolbar in settings.<\/li>\n<li>(Fix) Auto Leveling Feature to run more smoothly.<\/li>\n<li>(Fix) Hopper Lifting up because potatoes were in the deadband of sensor.<\/li>\n<\/ul>\n<h3>Version 2.04 (Apr 2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Added) Wing level safety that will stop the wing from tilting too far that it would hit the mainframe while planting.<\/li>\n<li>(Feature) Added configuration for floating toolbar<\/li>\n<li>(Feature) Added filtering to depth control sensors that improves the planters ability to plant in dust.<\/li>\n<li>(Fix) Update to this version or later if you have a new Rev 6 S4 board<\/li>\n<\/ul>\n<h3>Version 2.03 (2021) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) Hidden Row Config<\/li>\n<li>(Feature) Added return to level functionality with a pop up screen after planting and working position is left that allows you to stop autoleveling is desired.<\/li>\n<li>(Feature) Depth control on the wings will be disabled until the mainframe depth control reaches its set point.<\/li>\n<li>(Feature) In depth control settings you can set the max level the wing can lower from the main frame in percentage<\/li>\n<li>(change) Changed the tilt depth control from a PID control to a speed and deadband control.<\/li>\n<\/ul>\n<h3>Version 2.02 (2020) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) Fixed typo in code for 8308 which broke skip detection on rows 7 and 8<\/li>\n<li>(added) hidden row configuration that is for deere section control(outputs the cup speed of any cup section that is active)<\/li>\n<li>(update) updated to new version of s4x which supports new hw rev 3<\/li>\n<\/ul>\n<h3>Version 2.01 (2020) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(fix) Fixed Boost for Wheel assist<\/li>\n<li>(add) Added a button for manual override of wheel speed<\/li>\n<li>(change) Bumped up wing up and down offset from 55 to 75<\/li>\n<li>(change) Changed Kp, wing up offset and wing down offset to be for each wing individually instead of one for both<\/li>\n<li>(fix) Removed wing tilt in at the top of fold for the 12 row planter. So the wing will level then stop when completely folded<\/li>\n<li>(change) On wing fold up the wing will not wait every time for the disks to come in. after it waits once it will just go up right away when up is pressed and the disks are in.<\/li>\n<li>(fix) Removed the auto leveling when in synq mode. I did this so the wing never moves unless you are pressing a button<\/li>\n<li>(fix) Bumped up the value allowed to set equal to the frame because 8 row wings can go so much lower and so needs to be able to set the main frame level at a higher wing percentage<\/li>\n<\/ul>\n<h3>Version 1.17 (2020) <!--Nathan Yost--><\/h3>\n<ul>\n<li>Fixed typo in code for 8 row planter and fixed some breaking functionality on 8 row planter.<\/li>\n<\/ul>\n<h3>Version 1.09 (2019) <strong>Warning: Do not use on 2018 or 2017 model<\/strong> <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(Stable Release) 8312 2019 planting season version. <\/li>\n<\/ul>", "S4L": "<h1>Custom Eliminator (S4L) - Models: 990, 970<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ryan.wasden@spudnik.com\">Ryan Wasden em<\/a>, <a href=\"tel:208-239-xxxx\">208-239-xxxx tl<\/a><\/p>\n<h2>Stable release 2.06 \u2013 (2021) <!--Jack Yorgesen--><\/h2>\n<ul>\n<li>(New Model) 970 Configuration option<\/li>\n<li>(Added) Diagnostic speed setpoints S1 and S2 above actuals<\/li>\n<li>(Added) Parker hydraulic motor configuration option, most machines have danfoss<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 00.05 \u2013 (2020) <!--Jack Yorgesen--><\/h3>\n<ul>\n<li>(Changed) Faster Spiral roll speed updating <\/li>\n<\/ul>\n<h3>Version 00.03 \u2013 (2018) <!--Devin Vollmer--><\/h3>\n<ul>\n<li>(2018) First model year of 990 <\/li>\n<\/ul>", "S4M": "<h1>Spinach Harvester (S4M) - Models: BBL-1000<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a><\/p>\n<h2>Beta release 2.02 (April 2024) <!--Nathan Yost--><\/h2>\n<ul>\n<li>(feature) Added in a pop up for when one speed sensor isn't working properly throw an alarm<\/li>\n<li>(feature) Added in a slow start and stop for Primary,Secondary,Elevator, and infeed belts.<\/li>\n<li>(fix) Oil Temp Critical pop up and alarm was set to 250F instead of 180F. Now fixed to 180F<\/li>\n<li>(removed) Removed wheel angle sensor graph if sensor isn't connected<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.01 (Aug 2023) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(feature) Added in a pop up for when infeed belt isn't able to maintain set speed<\/li>\n<li>(Change) Updated diagnostics to better look and feel and matches Spudnik Standard<\/li>\n<li>(fix) Bug where Joystick Run button would get misaligned with Hydac Screen run button<\/li>\n<li>(feature) Added in an indicator for Elevator Up and Shield down requirements to swing the elevator<\/li>\n<\/ul>\n<h3>Version 1.04 (Aug 2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(feature) Added in Reject per minute display with alarm<\/li>\n<li>(feature) Added the mach config to display instead of S4 controller<\/li>\n<li>(feature) Added feature to retract bin transition  when swinging boom in. This is used to help avoid damage to right hand hydraulic box.<\/li>\n<\/ul>\n<h3>Version 1.03 (2022) <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Stable Release) for Tote Machine<\/li>\n<\/ul>\n<h3>Version 1.02 <!--Nathan Yost--><\/h3>\n<ul>\n<li>(Stable Release) for Bin Machine<\/li>\n<\/ul>", "S4N": "<h1>Belt Planter (S4N) - Models: 89XX<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:nathan.yost@spudnik.com\">Nathan Yost em<\/a>, <a href=\"208-239-5792\">208-239-5792 tl<\/a> / <a href=\"mailto:ervin.martinez@spudnik.com\">Ervin Martinez em<\/a>, <a href=\"tel:208-239-5700\">208-239-5700 x5849 tl<\/a><\/p>\n<h2>Stable Release   Version 2.06 \u2013 (June 2024) Nathan Yost<\/h2>\n<ul>\n<li>(Tested) This version run on multiple belt planters for 2024 planting season. <\/li>\n<li>(feature) Added in an acre window setting for the window for the real time lbs per acre.<\/li>\n<li>(fix) Fixed issue where Rows 9 and 10 not showing planting data  <\/li>\n<li>(Add) Functionality for 10 row 8910 planter<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h2>Beta Release Version 2.05 \u2013 (March 2024) Nathan Yost<\/h2>\n<ul>\n<li>(Change) Swapped direction of the level sensor for the Row Leveling Hill pro feature. Machines moving forward should all match this<\/li>\n<li>(fix) Rowshutoff feature is now working properly<\/li>\n<li>(fix) Lengthened alarm delay for 5 seconds for start of row so planter doesn't alarm every time you start a row <\/li>\n<li>(Add) Functionality for 10 row 8910 planter<\/li>\n<li>(feature) Added in a Statistics page that is still under construction<\/li>\n<li>(feature) Added a delay of 1 second for working position sensor. This is to help hitch style hook up not shutoff planter when going over pivot tracks<\/li>\n<li>(fix) wheel circumpherence was still affecting the gps speed so now gps comes directly from tractor<\/li>\n<li>(fix) feedbowls sensors will now use the lower value of the left and right sensors and not the average<\/li>\n<li>(fix) removed the 20% feedbowl showing issue. Now feedbowls will show correctly but will only fill to 20% less than target when stopped to help overfilling<\/li>\n<\/ul>\n<h2>Beta Release Version 2.04 \u2013 (May 2023) Nathan Yost<\/h2>\n<ul>\n<li>(Feature) Ability to for telematics data to be broadcasted over CAN if selected in the code<\/li>\n<li>(Feature) Changed joystick to lift and lower drawbar proportionally instead of just a fixed up and down<\/li>\n<li>(Change) Weight mode changes seed weight rather than the spacing<\/li>\n<li>(Feature) Added in temporary settings for weight mode to better tune that functionality that will get removed in later release<\/li>\n<li>(fix) Acre counter and hour counter are now working properly. <\/li>\n<li>(fix) Weight control mode now seems to work properly but may need some tweaking to opptimize performance<\/li>\n<li>(feature) Feedbowl heights set to 20% when not planting to avoid overfilling the hoppers<\/li>\n<li>Version tested in Grace Idaho in 2023<\/li>\n<\/ul>\n<h2>Stable Release 2.01 \u2013 (Feb 2023) <!--Nathan Yost--><\/h2>\n<ul>\n<li>(fix) Fixed Auto Adjust Feature<\/li>\n<li>(fix) Fixed Weight control Feature<\/li>\n<li>(improve) Improved Virtual terminal display to be more user friendly<\/li>\n<li>(feature) New feature for staggering feed belts and chain to help with surging in planting belt.<\/li>\n<\/ul>\n<h3>Version 1.02 <!--Nathan Yost--><\/h3>\n<ul>\n<li>First Release ran in 2022 Planting Season<\/li>\n<\/ul>", "S4P": "<h1>6740 Potato Harvester (S4P)<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineers: <a href=\"mailto:chad.cole@spudnik.com\">Chad Cole em<\/a>, <a href=\"tel:208-239-5789\">208-239-5789 tl<\/a> / <a href=\"mailto:jacob.christiansen@spudnik.com\">Jacob Christiansen em<\/a>, <a href=\"tel:208-589-2608\">208-589-2608 tl<\/a><\/p>\n<h2>Current release 2.08 (28 Oct 2025) <!--Chad Cole--><\/h2>\n<ul>\n<li>Added configuration option for wheel drive with free wheel charge system (wheel drive Version 2)<\/li>\n<li>Added configuration option for mechanical slip clutch on large frame intake chain<\/li>\n<li>Added configuration option for electric fan<\/li>\n<li>Added configuration option for side elevator shaker<\/li>\n<li>Added configuration option for 0.4-4.5v steering sensor<\/li>\n<li>Added Chain Alarm Threshhold on SPEEDS Setup screen<\/li>\n<li>Updated holding tank controls to smooth piler height computation and increase drop range<\/li>\n<li>Updated depth wheel AUTO behavior<\/li>\n<li>Updated configuration to allow Professional Table option on 6740 small frame<\/li>\n<\/ul>\n<h2>Previous Versions<\/h2>\n<h3>Version 2.07 (21 Jun 2024) <!--Chad Cole--><\/h3>\n<ul>\n<li>Modified code for manual and hydraulic depth wheel options to match functional control diagram<\/li>\n<li>Modified to allow support wheel and wheel drive options at the same time<\/li>\n<\/ul>\n<h3>Version 2.05 (29 Feb 2024) <!--Chad Cole--><\/h3>\n<ul>\n<li>2.05 is a minor fix for auto center button; all other fixes were released as 2.04.<\/li>\n<li>CCI display clean up (speeds page and home page; removed Intake Chain control on digger page when Intake is not configured)<\/li>\n<li>Consolidated L/R speed displays into one for primary/secondary chain; alarm is triggered by stall on either side, but only the slowest speed is displayed<\/li>\n<li>Adjusted holding tank timer and holding tank control<\/li>\n<li>Adjusted oil cooler code (cooler turns on when oil temp is above 80 degrees F and RUN is enabled and PTO is on)<\/li>\n<li>Depth control for small frame 6740 always uses \"Chains\" option; removed other options for small frame<\/li>\n<li>Autodig - eliminated requirement to press yellow preset after pressing START ROW<\/li>\n<li>Improved Digger Hump range calculation to be more stable<\/li>\n<li>Improved Axle height auto \"move to setpoint\" function to be more accurate<\/li>\n<li>Fixed Preset renaming page to work on tractor ISOBUS display<\/li>\n<li>Updated axle height display for small frame models<\/li>\n<\/ul>\n<h3>Version 2.02 (28 Aug 2023) <!--Chad Cole--><\/h3>\n<ul>\n<li>Fixed digger hump computation to avoid clearing minimum range setting.<\/li>\n<li>Fixed boom fold setting for swinging holding tank.<\/li>\n<\/ul>\n<h3>Version 2.01 (17 Aug 2023) <!--Chad Cole--><\/h3>\n<ul>\n<li>Fixed telescoping boom out control not working.<\/li>\n<li>Fixed hydraulic side elevator and rear cross controls not working.<\/li>\n<\/ul>\n<h3>Version 2.00 (3 Aug 2023) <!--Chad Cole--><\/h3>\n<ul>\n<li>Initial release of 6740 specific software. This separates 6740 software from the older S4G branch that supports multiple models. When updating to this version from an S4G version, you will need to reconfigure the S4 settings since options that don't apply have been removed. Significant changes from S4G 2.27 include the following:<ul>\n<li>S4 configuration options simplified and updated. Switching between 6xx0/574x harvester software (S4G) and 6740 specific hardware (S4P) requires redoing the S4 configuration to specify the relevant options.<\/li>\n<li>Simplified and cleaned up code. All code not relevant to 6740 operation was removed and some changes made to avoid potential errors. Program memory requirements reduced by 15%.<\/li>\n<li>Professional multi-sep table behavior updated. When changing clod roller from clean to transfer mode, if the clod roller is below the minimum limits, the roller automatically moves to the minimum setting and then turns on instead of just stopping.<\/li>\n<li>Miscellaneous CCI screen fixes.<\/li>\n<li>Modified load sense functionality for better performance.<\/li>\n<li>Wheel drive fixes - including wheel drive disengage if PTO speed is less than the minimum setting.<\/li>\n<li>Outside depth wheel control changed labels to reflect depth control instead of depth wheel height.<\/li>\n<li>Updates to input/output signals included on diagnostics screens.<\/li>\n<li>Update oil cooler control code (self-hydraulics option) to compute time on/off correctly.<\/li>\n<\/ul>\n<\/li>\n<\/ul>", "SCU": "<h1>Core Software (SCU)<\/h1>\n<p>Service/Support: <a href=\"tel:208-239-5788\">208-239-5788 tl<\/a>; Engineer: <a href=\"mailto:cameron.neff@spudnik.com\">Cameron Neff em<\/a>, <a href=\"208-239-5738\">208-239-5738 tl<\/a><\/p>\n<h3>Version 1.02 (7 Mar 2016) <!--Cameron Neff--><\/h3>\n<ul>\n<li>Only use this version to backdate from the newer update packages to the older updates. <\/li>\n<\/ul>\n<h3>Version 1.01 (7 Mar 2016) <!--Cameron Neff--><\/h3>\n<ul>\n<li>Use this version to prepare the controller for newer update packages. (S4A 1.05 +)(S4B 1.20 +)(S4C 1.20 +)(S4G 1.20 +) <\/li>\n<\/ul>", "SW_Version_Info": "<h1>Spudnik S4 Release Version Info<\/h1>\n<h2><a href=\"S4A.md\">(S4A) Potato Planter<\/a><\/h2>\n<h2><a href=\"S4B.md\">(S4B) Beet Harvester<\/a><\/h2>\n<h2><a href=\"S4C.md\">(S4C) Air Sep Harvester<\/a><\/h2>\n<h2><a href=\"S4D.md\">(S4D) Windrower <\/a><\/h2>\n<h2><a href=\"S4A.md\">(S4E) Crop Cart<\/a><\/h2>\n<h2><a href=\"S4F.md\">(S4F) Evenflow<\/a><\/h2>\n<h2><a href=\"S4G.md\">(S4G) Legacy Potato Harvester<\/a><\/h2>\n<h2><a href=\"S4H.md\">(S4H) Piler<\/a><\/h2>\n<h2><a href=\"S4I.md\">(S4I) Air Sep Eliminator<\/a><\/h2>\n<h2><a href=\"S4K.md\">(S4K) Folding Potato Planter<\/a><\/h2>\n<h2><a href=\"S4L.md\">(S4L) Custom Eliminator<\/a><\/h2>\n<h2><a href=\"S4M.md\">(S4M) Spinach Harvester<\/a><\/h2>\n<h2><a href=\"S4N.md\">(S4N) Belt Planter<\/a><\/h2>\n<h2><a href=\"S4P.md\">(S4P) Standard Potato Harvester<\/a><\/h2>\n<h2><a href=\"S49.md\">(S49) 7040 Terratron<\/a><\/h2>\n<h2><a href=\"SCU.md\">(SCU) Core Software<\/a><\/h2>"}</script>
  <script>
(function() {
  var data = JSON.parse(document.getElementById('io-data').textContent);
  var versionInfo = {};
  try { versionInfo = JSON.parse(document.getElementById('version-info').textContent); } catch (e) {}
  var tlas = ["S44", "S49", "S4A", "S4B", "S4C", "S4D", "S4G", "S4I", "S4J", "S4K", "S4L", "S4M", "S4N", "S4P", "S4R"];
  var tlaSelect = document.getElementById('tla-select');
  var locFilter = document.getElementById('loc-filter');
  var wrap = document.getElementById('table-wrap');
  tlas.forEach(function(tla) {
    var opt = document.createElement('option');
    opt.value = tla;
    opt.textContent = tla;
    tlaSelect.appendChild(opt);
  });
  function pinLabel(pin) {
    if (pin == null) return '';
    if (typeof pin === 'string') return pin;
    return (pin && pin.label) || '';
  }
  function pinNumber(pin) {
    return (pin && typeof pin === 'object' && pin.pinNumber) || '';
  }
  function signalType(pin) {
    return (pin && typeof pin === 'object' && pin.signalType) || '';
  }
  function formatLocationAndPin(exp, dir, ch, pn) {
    var leftPart = (pn && pn.indexOf(':') >= 0) ? pn.split(':')[0].trim().toUpperCase() : '';
    var locationLabel = (exp === '0') ? (leftPart || 'Main') : ('EXP' + exp);
    var sep = 'ch';
    if (exp === '0') {
      if (dir === 'outputs') sep = 'T';
      else if (dir === 'inputs') {
        var upper = (leftPart || pn || '').toUpperCase();
        if (/IN1|IN2/.test(upper)) sep = 'D';
        else if (/IN3|IN4/.test(upper)) sep = 'A';
      }
    } else {
      sep = (dir === 'inputs') ? 'XA' : 'XT';
    }
    return locationLabel + ' ' + sep + ' ' + ch + (pn ? ' (' + pn + ')' : '');
  }
  function render() {
    var tla = tlaSelect.value;
    var tlaData = data[tla];
    if (!tlaData) {
      wrap.innerHTML = '<p class="empty">No IO data for ' + tla + '</p>';
      return;
    }
    var rows = [];
    ['inputs', 'outputs'].forEach(function(dir) {
      var byExp = tlaData[dir] || {};
      Object.keys(byExp).sort(function(a, b) {
        if (a === '0') return -1;
        if (b === '0') return 1;
        return parseInt(a, 10) - parseInt(b, 10);
      }).forEach(function(exp) {
        var chMap = byExp[exp] || {};
        Object.keys(chMap).sort(function(a, b) { return parseInt(a, 10) - parseInt(b, 10); }).forEach(function(ch) {
          var pin = chMap[ch];
          var pn = pinNumber(pin);
          var locationAndPin = formatLocationAndPin(exp, dir, ch, pn);
          rows.push({
            label: pinLabel(pin),
            locationAndPin: locationAndPin,
            signalType: signalType(pin)
          });
        });
      });
    });
    if (rows.length === 0) {
      wrap.innerHTML = '<p class="empty">No pins defined for ' + tla + '</p>';
      return;
    }
    var filterVal = locFilter.value;
    function rowVisible(locationAndPin) {
      return !filterVal || (locationAndPin && locationAndPin.indexOf(filterVal) === 0);
    }
    var table = '<table><thead><tr><th>Pin label</th><th>Location (pin number)</th><th>Signal type</th></tr></thead><tbody>';
    rows.forEach(function(r) {
      var show = rowVisible(r.locationAndPin);
      var tr = '<tr data-location="' + escapeHtml(r.locationAndPin) + '"' + (show ? '' : ' style="display:none"') + '>';
      tr += '<td>' + escapeHtml(r.label) + '</td><td>' + escapeHtml(r.locationAndPin) + '</td><td>' + escapeHtml(r.signalType) + '</td></tr>';
      table += tr;
    });
    table += '</tbody></table>';
    wrap.innerHTML = table;
  }
  function applyFilter() {
    var filterVal = locFilter.value;
    var trs = wrap.querySelectorAll('tbody tr');
    trs.forEach(function(tr) {
      var loc = tr.getAttribute('data-location') || (tr.cells[1] && tr.cells[1].textContent) || '';
      var show = !filterVal || (loc.indexOf(filterVal) === 0);
      tr.style.display = show ? '' : 'none';
    });
  }
  function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  tlaSelect.addEventListener('change', render);
  locFilter.addEventListener('change', function() {
    if (wrap.querySelector('tbody')) applyFilter();
    else render();
  });
  var modal = document.getElementById('myModal');
  var btn = document.getElementById('myBtn');
  if (modal && btn) {
    var span = modal.querySelector('.close');
    btn.onclick = function() { modal.style.display = 'block'; };
    if (span) span.onclick = function() { modal.style.display = 'none'; };
  }
  var versionModal = document.getElementById('versionModal');
  var versionBtn = document.getElementById('versionBtn');
  var versionModalBody = document.getElementById('versionModalBody');
  if (versionModal && versionBtn && versionModalBody) {
    versionBtn.onclick = function() {
      var tla = tlaSelect.value;
      var html = versionInfo[tla];
      versionModalBody.innerHTML = (html && html.length) ? html : '<p class="empty">No version info for this TLA.</p>';
      versionModal.style.display = 'block';
    };
    var versionClose = versionModal.querySelector('.close');
    if (versionClose) versionClose.onclick = function() { versionModal.style.display = 'none'; };
  }
  window.onclick = function(event) {
    if (event.target === modal) modal.style.display = 'none';
    if (event.target === versionModal) versionModal.style.display = 'none';
  };
  render();
})();
  </script>
</body>
</html>
